b"],"space_id":"d96aaae0-84dc-4705-b5d0-90486c39d53f"},"role":"reader"},"12826e1e-824f-802d-8305-fe29cf5367a6":{"value":{"id":"12826e1e-824f-802d-8305-fe29cf5367a6","version":16,"type":"text","properties":{"title":[["处理多行文本时，确保自定义下划线（或其他样式）在跨越多行的文本范围内正确显示是一项挑战。使用 "],["ReplacementSpan",[["c"]]],[" 虽然可以在特定的文本范围内应用自定义样式，但对于跨越多行的文本，管理和绘制下划线变得复杂。因此，更适合的方法是使用 "],["LineBackgroundSpan",[["c"]]],["，因为它在每一行上被调用，使得我们可以针对每一行单独绘制下划线。"]]},"created_time":1729697803816,"last_edited_time":1729697818862,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive":true,"space_id":"d96aaae0-84dc-4705-b5d0-90486c39d53f"},"role":"reader"},"12826e1e-824f-809a-9e85-db87ad1d470b":{"value":{"id":"12826e1e-824f-809a-9e85-db87ad1d470b","version":2,"type":"text","properties":{"title":[["下面，我将详细介绍如何使用 "],["LineBackgroundSpan",[["c"]]],[" 来实现一个可修改颜色和宽度的下划线 "],["TextView",[["c"]]],["，并确保它能够正确处理多行文本。"]]},"created_time":1729697803817,"last_edited_time":1729697803857,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive":true,"space_id":"d96aaae0-84dc-4705-b5d0-90486c39d53f"},"role":"reader"},"12826e1e-824f-807b-9156-e4045f5fa9a9":{"value":{"id":"12826e1e-824f-807b-9156-e4045f5fa9a9","version":2,"type":"sub_header","properties":{"title":[["1. 使用 "],["LineBackgroundSpan",[["c"]]],[" 实现自定义下划线"]]},"created_time":1729697803818,"last_edited_time":1729697803857,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive":true,"space_id":"d96aaae0-84dc-4705-b5d0-90486c39d53f"},"role":"reader"},"12826e1e-824f-80d3-a0d1-cdedd96ca4dc":{"value":{"id":"12826e1e-824f-80d3-a0d1-cdedd96ca4dc","version":2,"type":"text","properties":{"title":[["LineBackgroundSpan",[["c"]]],[" 的 "],["drawBackground",[["c"]]],[" 方法会为每一行文本调用一次。这意味着我们可以在该方法中检查当前行是否在我们希望应用下划线的文本范围内，并根据需要绘制下划线。"]]},"created_time":1729697803818,"last_edited_time":1729697803857,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive":true,"space_id":"d96aaae0-84dc-4705-b5d0-90486c39d53f"},"role":"reader"},"12826e1e-824f-802e-b787-fc4449eb765d":{"value":{"id":"12826e1e-824f-802e-b787-fc4449eb765d","version":2,"type":"sub_sub_header","properties":{"title":[["1.1 创建自定义下划线 "],["Span",[["c"]]]]},"created_time":1729697803818,"last_edited_time":1729697803857,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive":true,"space_id":"d96aaae0-84dc-4705-b5d0-90486c39d53f"},"role":"reader"},"12826e1e-824f-806c-937c-c30217de66f4":{"value":{"id":"12826e1e-824f-806c-937c-c30217de66f4","version":2,"type":"text","properties":{"title":[["首先，创建一个自定义的 "],["LineBackgroundSpan",[["c"]]],["，允许我们在指定的文本范围内绘制自定义的下划线。"]]},"created_time":1729697803819,"last_edited_time":1729697803857,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive":true,"space_id":"d96aaae0-84dc-4705-b5d0-90486c39d53f"},"role":"reader"},"12826e1e-824f-80ca-8baf-d2f686019b5b":{"value":{"id":"12826e1e-824f-80ca-8baf-d2f686019b5b","version":2,"type":"code","properties":{"title":[["import android.graphics.Canvas\nimport android.graphics.Paint\nimport android.text.style.LineBackgroundSpan\n\nclass MultiLineCustomUnderlineSpan(\n    private val underlineColor: Int,\n    private val underlineThickness: Float\n) : LineBackgroundSpan {\n\n    private var spanStart: Int = 0\n    private var spanEnd: Int = 0\n\n    /**\n     * 用于在 Span 被应用时记录 Span 的起始和结束位置\n     */\n    fun setSpanRange(start: Int, end: Int) {\n        this.spanStart = start\n        this.spanEnd = end\n    }\n\n    override fun drawBackground(\n        canvas: Canvas,\n        paint: Paint,\n        left: Int,       // 文本区域的左边界\n        right: Int,      // 文本区域的右边界\n        top: Int,        // 文本区域的顶部\n        baseline: Int,   // 基线\n        bottom: Int,     // 文本区域的底部\n        text: CharSequence,\n        start: Int,      // 当前行的起始索引\n        end: Int,        // 当前行的结束索引\n        lineNumber: Int\n    ) {\n        // 确定当前行的 Span 应用范围\n        val lineStart = maxOf(start, spanStart)\n        val lineEnd = minOf(end, spanEnd)\n\n        if (lineStart \u003e= lineEnd) {\n            // 当前行不在 Span 应用范围内\n            return\n        }\n\n        // 计算下划线的起始和结束 X 坐标\n        val xStart = paint.measureText(text, start, lineStart) + left.toFloat()\n        val xEnd = paint.measureText(text, start, lineEnd) + left.toFloat()\n\n        // 设置下划线的颜色和厚度\n        val originalColor = paint.color\n        val originalStrokeWidth = paint.strokeWidth\n\n        paint.color = underlineColor\n        paint.strokeWidth = underlineThickness\n\n        // 计算下划线的 Y 坐标\n        val underlineY = (baseline + paint.fontMetrics.descent + underlineThickness).toFloat()\n\n        // 绘制下划线\n        canvas.drawLine(xStart, underlineY, xEnd, underlineY, paint)\n\n        // 恢复画笔的原始颜色和线宽\n        paint.color = originalColor\n        paint.strokeWidth = originalStrokeWidth\n    }\n}\n"]],"language":[["Kotlin"]]},"format":{"code_wrap":true},"created_time":1729697803819,"last_edited_time":1729697803857,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive":true,"space_id":"d96aaae0-84dc-4705-b5d0-90486c39d53f"},"role":"reader"},"12826e1e-824f-806a-98b9-f55239e32037":{"value":{"id":"12826e1e-824f-806a-98b9-f55239e32037","version":2,"type":"sub_sub_header","properties":{"title":[["1.2 应用自定义 "],["Span",[["c"]]],[" 到 "],["TextView",[["c"]]]]},"created_time":1729697803819,"last_edited_time":1729697803857,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive":true,"space_id":"d96aaae0-84dc-4705-b5d0-90486c39d53f"},"role":"reader"},"12826e1e-824f-8018-be2d-fbe9fa7c2fee":{"value":{"id":"12826e1e-824f-8018-be2d-fbe9fa7c2fee","version":2,"type":"text","properties":{"title":[["接下来，在 "],["Activity",[["c"]]],[" 或 "],["Fragment",[["c"]]],[" 中，将自定义的 "],["MultiLineCustomUnderlineSpan",[["c"]]],[" 应用到 "],["TextView",[["c"]]],[" 的文本中，并确保正确设置 Span 的起始和结束位置。"]]},"created_time":1729697803821,"last_edited_time":1729697803857,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive":true,"space_id":"d96aaae0-84dc-4705-b5d0-90486c39d53f"},"role":"reader"},"12826e1e-824f-805a-8987-e7fba4d01304":{"value":{"id":"12826e1e-824f-805a-8987-e7fba4d01304","version":2,"type":"code","properties":{"title":[["import android.graphics.Color\nimport android.os.Bundle\nimport android.text.SpannableString\nimport android.text.Spanned\nimport android.widget.TextView\nimport androidx.appcompat.app.AppCompatActivity\n\nclass MainActivity : AppCompatActivity() {\n\n    override fun onCreate(savedInstanceState: Bundle?) {\n        super.onCreate(savedInstanceState)\n        // 假设你的布局文件为 activity_main，并且包含一个 TextView，ID 为 textView\n        setContentView(R.layout.activity_main)\n\n        val textView: TextView = findViewById(R.id.textView)\n\n        val fullText = \"这是一个带自定义下划线的文本，可以修改部分的下划线样式，并且这个下划线可以跨越多行。我们将展示如何在多行文本中正确绘制自定义下划线。\"\n        val spannableString = SpannableString(fullText)\n\n        // 创建自定义下划线 Span，颜色为红色，厚度为5像素\n        val underlineSpan = MultiLineCustomUnderlineSpan(Color.RED, 5f)\n\n        // 设置 Span 的起始和结束位置\n        val spanStart = 5\n        val spanEnd = 50\n        underlineSpan.setSpanRange(spanStart, spanEnd)\n\n        // 将 Span 应用到指定的文本范围\n        spannableString.setSpan(\n            underlineSpan,\n            spanStart,\n            spanEnd,\n            Spanned.SPAN_EXCLUSIVE_EXCLUSIVE\n        )\n\n        // 设置带有 Span 的文本到 TextView\n        textView.text = spannableString\n    }\n}\n"]],"language":[["Kotlin"]]},"format":{"code_wrap":true},"created_time":1729697803821,"last_edited_time":1729697803857,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive":true,"space_id":"d96aaae0-84dc-4705-b5d0-90486c39d53f"},"role":"reader"},"12826e1e-824f-8075-a7b6-e5740dbc9364":{"value":{"id":"12826e1e-824f-8075-a7b6-e5740dbc9364","version":2,"type":"sub_sub_header","properties":{"title":[["1.3 布局文件示例 ("],["activity_main.xml",[["c"]]],[")"]]},"created_ eader"},"12826e1e-824f-80a4-8bf7-ce65b24ed55c":{"value":{"id":"12826e1e-824f-80a4-8bf7-ce65b24ed55c","version":2,"type":"numbered_list","properties":{"title":[["性能优化",[["b"]]],["：这种方法在处理跨越多行的文本时相对高效，因为它只在每一行需要绘制下划线的部分进行绘制。"]]},"created_time":1729697803825,"last_edited_time":1729697803857,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive":true,"space_id":"d96aaae0-84dc-4705-b5d0-90486c39d53f"},"role":"reader"},"12826e1e-824f-8036-be07-ef9ac0f25d1a":{"value":{"id":"12826e1e-824f-8036-be07-ef9ac0f25d1a","version":2,"type":"sub_header","properties":{"title":[["2. 处理多行文本的完整代码示例"]]},"created_time":1729697803825,"last_edited_time":1729697803857,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive":true,"space_id":"d96aaae0-84dc-4705-b5d0-90486c39d53f"},"role":"reader"},"12826e1e-824f-802c-8f68-d76b5f8014d4":{"value":{"id":"12826e1e-824f-802c-8f68-d76b5f8014d4","version":2,"type":"text","properties":{"title":[["为了方便理解，以下是完整的代码示例，包括自定义 "],["Span",[["c"]]],[" 和 "],["Activity",[["c"]]],[" 中的应用。"]]},"created_time":1729697803825,"last_edited_time":1729697803857,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive":true,"space_id":"d96aaae0-84dc-4705-b5d0-90486c39d53f"},"role":"reader"},"12826e1e-824f-800a-85eb-cde0cf282b01":{"value":{"id":"12826e1e-824f-800a-85eb-cde0cf282b01","version":2,"type":"sub_sub_header","properties":{"title":[["2.1 "],["MultiLineCustomUnderlineSpan.kt",[["c"]]]]},"created_time":1729697803825,"last_edited_time":1729697803857,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive":true,"space_id":"d96aaae0-84dc-4705-b5d0-90486c39d53f"},"role":"reader"},"12826e1e-824f-803c-80b2-f0c9f746c069":{"value":{"id":"12826e1e-824f-803c-80b2-f0c9f746c069","version":2,"type":"code","properties":{"title":[["import android.graphics.Canvas\nimport android.graphics.Paint\nimport android.text.style.LineBackgroundSpan\n\nclass MultiLineCustomUnderlineSpan(\n    private val underlineColor: Int,\n    private val underlineThickness: Float\n) : LineBackgroundSpan {\n\n    private var spanStart: Int = 0\n    private var spanEnd: Int = 0\n\n    /**\n     * 用于在 Span 被应用时记录 Span 的起始和结束位置\n     */\n    fun setSpanRange(start: Int, end: Int) {\n        this.spanStart = start\n        this.spanEnd = end\n    }\n\n    override fun drawBackground(\n        canvas: Canvas,\n        paint: Paint,\n        left: Int,       // 文本区域的左边界\n        right: Int,      // 文本区域的右边界\n        top: Int,        // 文本区域的顶部\n        baseline: Int,   // 基线\n        bottom: Int,     // 文本区域的底部\n        text: CharSequence,\n        start: Int,      // 当前行的起始索引\n        end: Int,        // 当前行的结束索引\n        lineNumber: Int\n    ) {\n        // 确定当前行的 Span 应用范围\n        val lineStart = maxOf(start, spanStart)\n        val lineEnd = minOf(end, spanEnd)\n\n        if (lineStart \u003e= lineEnd) {\n            // 当前行不在 Span 应用范围内\n            return\n        }\n\n        // 计算下划线的起始和结束 X 坐标\n        val xStart = paint.measureText(text, start, lineStart) + left.toFloat()\n        val xEnd = paint.measureText(text, start, lineEnd) + left.toFloat()\n\n        // 设置下划线的颜色和厚度\n        val originalColor = paint.color\n        val originalStrokeWidth = paint.strokeWidth\n\n        paint.color = underlineColor\n        paint.strokeWidth = underlineThickness\n\n        // 计算下划线的 Y 坐标\n        val underlineY = (baseline + paint.fontMetrics.descent + underlineThickness).toFloat()\n\n        // 绘制下划线\n        canvas.drawLine(xStart, underlineY, xEnd, underlineY, paint)\n\n        // 恢复画笔的原始颜色和线宽\n        paint.color = originalColor\n        paint.strokeWidth = originalStrokeWidth\n    }\n}\n"]],"language":[["Kotlin"]]},"format":{"code_wrap":true},"created_time":1729697803825,"last_edited_time":1729697803857,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive":true,"space_id":"d96aaae0-84dc-4705-b5d0-90486c39d53f"},"role":"reader"},"12826e1e-824f- nActivity : AppCompatActivity() {\n\n    override fun onCreate(savedInstanceState: Bundle?) {\n        super.onCreate(savedInstanceState)\n        // 假设你的布局文件为 activity_main，并且包含一个 TextView，ID 为 textView\n        setContentView(R.layout.activity_main)\n\n        val textView: TextView = findViewById(R.id.textView)\n\n        val fullText = \"这是一个带自定义下划线的文本，可以修改部分的下划线样式，并且这个下划线可以跨越多行。我们将展示如何在多行文本中正确绘制自定义下划线。\"\n        val spannableString = SpannableString(fullText)\n\n        // 创建第一个自定义下划线 Span，颜色为红色，厚度为5像素\n        val underlineSpan1 = MultiLineCustomUnderlineSpan(Color.RED, 5f)\n        val spanStart1 = 5\n        val spanEnd1 = 50\n        underlineSpan1.setSpanRange(spanStart1, spanEnd1)\n        spannableString.setSpan(\n            underlineSpan1,\n            spanStart1,\n            spanEnd1,\n            Spanned.SPAN_EXCLUSIVE_EXCLUSIVE\n        )\n\n        // 创建第二个自定义下划线 Span，颜色为蓝色，厚度为3像素\n        val underlineSpan2 = MultiLineCustomUnderlineSpan(Color.BLUE, 3f)\n        val spanStart2 = 55\n        val spanEnd2 = 100\n        underlineSpan2.setSpanRange(spanStart2, spanEnd2)\n        spannableString.setSpan(\n            underlineSpan2,\n            spanStart2,\n            spanEnd2,\n            Spanned.SPAN_EXCLUSIVE_EXCLUSIVE\n        )\n\n        // 设置带有 Span 的文本到 TextView\n        textView.text = spannableString\n    }\n}\n"]],"language":[["Kotlin"]]},"format":{"code_wrap":true},"created_time":1729697803827,"last_edited_time":1729697803857,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive":true,"space_id":"d96aaae0-84dc-4705-b5d0-90486c39d53f"},"role":"reader"},"12826e1e-824f-806b-8a90-e29152bb501d":{"value":{"id":"12826e1e-824f-806b-8a90-e29152bb501d","version":2,"type":"text","properties":{"title":[["在这个示例中，我们在同一个文本中应用了两个不同的下划线 Span，一个红色、厚度为5像素，另一个蓝色、厚度为3像素，分别应用于不同的文本范围。"]]},"created_time":1729697803827,"last_edited_time":1729697803857,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive" Span\n\nclass MultiLineCustomUnderlineSpan(\n    private val underlineColor: Int,\n    private val underlineThickness: Float\n) : LineBackgroundSpan {\n\n    private var spanStart: Int = 0\n    private var spanEnd: Int = 0\n\n    /**\n     * 用于在 Span 被应用时记录 Span 的起始和结束位置\n     */\n    fun setSpanRange(start: Int, end: Int) {\n        this.spanStart = start\n        this.spanEnd = end\n    }\n\n    override fun drawBackground(\n        canvas: Canvas,\n        paint: Paint,\n        left: Int,       // 文本区域的左边界\n        right: Int,      // 文本区域的右边界\n        top: Int,        // 文本区域的顶部\n        baseline: Int,   // 基线\n        bottom: Int,     // 文本区域的底部\n        text: CharSequence,\n        start: Int,      // 当前行的起始索引\n        end: Int,        // 当前行的结束索引\n        lineNumber: Int\n    ) {\n        // 确定当前行的 Span 应用范围\n        val lineStart = maxOf(start, spanStart)\n        val lineEnd = minOf(end, spanEnd)\n\n        if (lineStart \u003e= lineEnd) {\n            // 当前行不在 Span 应用范围内\n            return\n        }\n\n        // 计算下划线的起始和结束 X 坐标\n        val xStart = paint.measureText(text, start, lineStart) + left.toFloat()\n        val xEnd = paint.measureText(text, start, lineEnd) + left.toFloat()\n\n        // 设置下划线的颜色和厚度\n        val originalColor = paint.color\n        val originalStrokeWidth = paint.strokeWidth\n\n        paint.color = underlineColor\n        paint.strokeWidth = underlineThickness\n\n        // 计算下划线的 Y 坐标\n        val underlineY = (baseline + paint.fontMetrics.descent + underlineThickness).toFloat()\n\n        // 绘制下划线\n        canvas.drawLine(xStart, underlineY, xEnd, underlineY, paint)\n\n        // 恢复画笔的原始颜色和线宽\n        paint.color = originalColor\n        paint.strokeWidth = originalStrokeWidth\n    }\n}\n"]],"language":[["Kotlin"]]},"format":{"code_wrap":true},"created_time":1729697803829,"last_edited_time":1729697803857,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive":true,"space_id":"d96aaae0-84dc-4705-b5 LUSIVE_EXCLUSIVE\n        )\n\n        // 设置带有 Span 的文本到 TextView\n        textView.text = spannableString\n    }\n}\n"]],"language":[["Kotlin"]]},"format":{"code_wrap":true},"created_time":1729697803829,"last_edited_time":1729697803857,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive":true,"space_id":"d96aaae0-84dc-4705-b5d0-90486c39d53f"},"role":"reader"},"12826e1e-824f-80b4-b3f0-da358d308ad7":{"value":{"id":"12826e1e-824f-80b4-b3f0-da358d308ad7","version":2,"type":"sub_sub_header","properties":{"title":[["6.3 "],["activity_main.xml",[["c"]]]]},"created_time":1729697803829,"last_edited_time":1729697803857,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive":true,"space_id":"d96aaae0-84dc-4705-b5d0-90486c39d53f"},"role":"reader"},"12826e1e-824f-80b4-a342-f3ad9670630c":{"value":{"id":"12826e1e-824f-80b4-a342-f3ad9670630c","version":2,"type":"code","properties":{"title":[["\u003c?xml version=\"1.0\" encoding=\"utf-8\"?\u003e\n\u003cScrollView xmlns:android=\"\u003chttp://schemas.android.com/apk/res/android\u003e\"\n    android:layout_width=\"match_parent\"\n    android:layout_height=\"match_parent\"\u003e\n\n    \u003cLinearLayout\n        android:layout_width=\"match_parent\"\n        android:orientation=\"vertical\"\n        android:gravity=\"center\"\n        android:layout_height=\"wrap_content\"\n        android:padding=\"16dp\"\u003e\n\n        \u003cTextView\n            android:id=\"@+id/textView\"\n            android:textSize=\"18sp\"\n            android:padding=\"16dp\"\n            android:layout_width=\"match_parent\"\n            android:layout_height=\"wrap_content\"\n            android:lineSpacingExtra=\"4dp\" /\u003e\n    \u003c/LinearLayout\u003e\n\u003c/ScrollView\u003e\n"]],"language":[["XML"]]},"format":{"code_wrap":true},"created_time":1729697803829,"last_edited_time":1729697803857,"parent_id":"12826e1e-824f-80a7-a791-f0ad4d6349f0","parent_table":"block","alive":true,"space_id":"d96a
